<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Studio — Offline</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --surface: #1a1a2e;
            --surface-2: #16213e;
            --accent: #e94560;
            --accent-2: #0f3460;
            --text: #eee;
            --text-dim: #999;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .header {
            text-align: center;
            padding: 2rem 1rem 1rem;
            border-bottom: 1px solid #222;
        }
        .header h1 { font-size: 1.8rem; font-weight: 700; }
        .header p { color: var(--text-dim); margin-top: 0.3rem; font-size: 0.9rem; }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem;
        }
        .tab {
            padding: 0.6rem 1.5rem;
            border: 1px solid #333;
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .tab.active, .tab:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .panel { display: none; max-width: 800px; margin: 0 auto; padding: 1.5rem; }
        .panel.active { display: block; }

        label {
            display: block;
            margin-bottom: 0.3rem;
            font-size: 0.85rem;
            color: var(--text-dim);
            font-weight: 500;
        }

        textarea, input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 0.7rem;
            border: 1px solid #333;
            border-radius: 8px;
            background: var(--surface-2);
            color: var(--text);
            font-size: 0.95rem;
            font-family: inherit;
            margin-bottom: 1rem;
            resize: vertical;
        }
        textarea:focus, input:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.8rem 2rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            width: 100%;
            justify-content: center;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .result {
            margin-top: 1.5rem;
            padding: 1rem;
            background: var(--surface);
            border-radius: var(--radius);
            text-align: center;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .result img {
            max-width: 100%;
            border-radius: 8px;
        }

        .status {
            text-align: center;
            padding: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .spinner {
            display: inline-block;
            width: 20px; height: 20px;
            border: 2px solid #555;
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header">
        <h1>Creative Studio</h1>
        <p>Offline Bild- &amp; Musikgenerierung &bull; Intel CPU / OpenVINO</p>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('image')">Bild generieren</div>
        <div class="tab" onclick="switchTab('music')">Musik generieren</div>
    </div>

    <!-- ==================== Bild-Generierung ==================== -->
    <div id="panel-image" class="panel active">
        <label for="img-prompt">Prompt</label>
        <textarea id="img-prompt" rows="3" placeholder="z.B. A serene mountain landscape at sunset, photorealistic, 4k"></textarea>

        <label for="img-negative">Negative Prompt</label>
        <input type="text" id="img-negative" placeholder="z.B. blurry, low quality, distorted" value="blurry, low quality, ugly, distorted">

        <div class="row">
            <div>
                <label for="img-steps">Steps</label>
                <input type="number" id="img-steps" value="20" min="1" max="50">
            </div>
            <div>
                <label for="img-width">Breite</label>
                <select id="img-width">
                    <option value="384">384</option>
                    <option value="512" selected>512</option>
                    <option value="640">640</option>
                    <option value="768">768</option>
                </select>
            </div>
            <div>
                <label for="img-height">Höhe</label>
                <select id="img-height">
                    <option value="384">384</option>
                    <option value="512" selected>512</option>
                    <option value="640">640</option>
                    <option value="768">768</option>
                </select>
            </div>
        </div>

        <button class="btn" id="btn-image" onclick="generateImage()">Bild generieren</button>
        <div class="status" id="status-image"></div>
        <div class="result" id="result-image">
            <span style="color: var(--text-dim);">Hier erscheint das generierte Bild</span>
        </div>
    </div>

    <!-- ==================== Musik-Generierung ==================== -->
    <div id="panel-music" class="panel">
        <label for="music-prompt">Prompt</label>
        <textarea id="music-prompt" rows="3" placeholder="z.B. Upbeat electronic dance music with synth leads and driving bass"></textarea>

        <label for="music-duration">Dauer (Sekunden)</label>
        <input type="number" id="music-duration" value="10" min="3" max="30">

        <button class="btn" id="btn-music" onclick="generateMusic()">Musik generieren</button>
        <div class="status" id="status-music"></div>
        <div class="result" id="result-music">
            <span style="color: var(--text-dim);">Hier erscheint der generierte Audiotrack</span>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById('panel-' + tab).classList.add('active');
            event.target.classList.add('active');
        }

        async function generateImage() {
            const btn = document.getElementById('btn-image');
            const status = document.getElementById('status-image');
            const result = document.getElementById('result-image');

            const prompt = document.getElementById('img-prompt').value.trim();
            if (!prompt) { status.textContent = 'Bitte einen Prompt eingeben.'; return; }

            btn.disabled = true;
            status.innerHTML = '<span class="spinner"></span> Generiere Bild... (kann 1-2 Minuten dauern)';
            result.innerHTML = '';

            try {
                const startTime = Date.now();
                const response = await fetch('/sdapi/v1/txt2img', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        prompt: prompt,
                        negative_prompt: document.getElementById('img-negative').value,
                        steps: parseInt(document.getElementById('img-steps').value),
                        width: parseInt(document.getElementById('img-width').value),
                        height: parseInt(document.getElementById('img-height').value),
                        cfg_scale: 7.0,
                        seed: -1,
                    }),
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || 'Fehler bei der Generierung');
                }

                const data = await response.json();
                const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                status.textContent = 'Fertig in ' + elapsed + 's — ' + data.info;

                if (data.images && data.images.length > 0) {
                    const img = document.createElement('img');
                    img.src = 'data:image/png;base64,' + data.images[0];
                    img.alt = prompt;
                    result.innerHTML = '';
                    result.appendChild(img);
                }
            } catch (error) {
                status.textContent = 'Fehler: ' + error.message;
                result.innerHTML = '<span style="color:#e94560;">' + error.message + '</span>';
            } finally {
                btn.disabled = false;
            }
        }

        async function generateMusic() {
            const btn = document.getElementById('btn-music');
            const status = document.getElementById('status-music');
            const result = document.getElementById('result-music');

            const prompt = document.getElementById('music-prompt').value.trim();
            if (!prompt) { status.textContent = 'Bitte einen Prompt eingeben.'; return; }

            btn.disabled = true;
            status.innerHTML = '<span class="spinner"></span> Generiere Musik... (kann 2-5 Minuten dauern)';
            result.innerHTML = '';

            try {
                const startTime = Date.now();
                const duration = parseInt(document.getElementById('music-duration').value);
                const response = await fetch('/api/music/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt, duration: duration }),
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || 'Fehler bei der Generierung');
                }

                const blob = await response.blob();
                const audioUrl = URL.createObjectURL(blob);
                const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
                status.textContent = 'Fertig in ' + elapsed + 's';

                result.innerHTML = `
                    <div style="width:100%;">
                        <audio controls style="width:100%;">
                            <source src="${audioUrl}" type="audio/wav">
                        </audio>
                        <br>
                        <a href="${audioUrl}" download="music.wav"
                           style="color:var(--accent); text-decoration:none; font-size:0.9rem;">
                           Download WAV
                        </a>
                    </div>
                `;
            } catch (error) {
                status.textContent = 'Fehler: ' + error.message;
                result.innerHTML = '<span style="color:#e94560;">' + error.message + '</span>';
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
