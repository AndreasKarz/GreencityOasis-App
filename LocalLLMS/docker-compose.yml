# ============================================================
# Offline LLM Stack — Docker Compose
# CPU-Only (Intel i7/i9, 64GB RAM, keine GPU)
# ============================================================
# Services:
#   1. Ollama          — LLM Runtime für Text-Modelle
#   2. Llama-Embed     — Dedizierter Embedding-Server (batch-size 2048)
#   3. Open WebUI      — Browser-UI für Chat, RAG, Modellwechsel
#   4. Creative Studio — Bild- & Musikgenerierung (OpenVINO)
#   5. Neo4j           — Graph-Datenbank für GraphRAG
#   6. SearXNG         — Meta-Suchmaschine für Web Search
# ============================================================

services:
  # -----------------------------------------------------------
  # Ollama — Text LLM Runtime
  # -----------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    environment:
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_FLASH_ATTENTION=1
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  # -----------------------------------------------------------
  # Llama-Embed — Dedizierter Embedding-Server
  # GGUF-Modell ist direkt im Image integriert (kein Volume nötig)
  # Nutzt llama.cpp mit batch-size 2048 gegen "input too large" Fehler
  # -----------------------------------------------------------
  llama-embed:
    build:
      context: .
      dockerfile: Dockerfile.embed
    container_name: llama-embed
    restart: unless-stopped
    ports:
      - "${EMBED_PORT:-8090}:8090"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8090/health 2>/dev/null || curl -sf http://localhost:8090/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s

  # -----------------------------------------------------------
  # Open WebUI — Chat-Interface mit RAG
  # -----------------------------------------------------------
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    volumes:
      - ./data/open-webui:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      # Bild-Generierung via Creative Studio (AUTOMATIC1111-kompatible API)
      - AUTOMATIC1111_BASE_URL=http://creative-studio:7860
      - IMAGE_GENERATION_ENGINE=automatic1111
      - ENABLE_IMAGE_GENERATION=true
      # RAG-Einstellungen — Embedding via dedizierten llama-embed Server
      # (OpenAI-kompatible API auf llama.cpp mit batch-size 2048)
      - RAG_EMBEDDING_ENGINE=openai
      - RAG_EMBEDDING_MODEL=nomic-embed-text-v1.5
      - RAG_OPENAI_API_BASE_URL=http://llama-embed:8090/v1
      - RAG_OPENAI_API_KEY=not-needed
      - RAG_TOP_K=5
      - CHUNK_SIZE=1000
      - CHUNK_OVERLAP=200
      # Offline-Modus
      - ENABLE_SIGNUP=true
      - WEBUI_AUTH=false
      # Web Search via SearXNG
      - ENABLE_RAG_WEB_SEARCH=true
      - RAG_WEB_SEARCH_ENGINE=searxng
      - SEARXNG_QUERY_URL=http://searxng:8080/search?q=<query>&format=json
    depends_on:
      ollama:
        condition: service_healthy
      llama-embed:
        condition: service_healthy
      searxng:
        condition: service_healthy

  # -----------------------------------------------------------
  # Creative Studio — Bild & Musik (OpenVINO für Intel CPU)
  # -----------------------------------------------------------
  creative-studio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: creative-studio
    restart: unless-stopped
    ports:
      - "${CREATIVE_PORT:-7860}:7860"
    volumes:
      - ./data/models/stable-diffusion:/models/stable-diffusion
      - ./data/models/musicgen:/models/musicgen
    environment:
      - SD_MODEL_PATH=/models/stable-diffusion
      - MUSICGEN_MODEL_PATH=/models/musicgen
      - HOST=0.0.0.0
      - PORT=7860
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # -----------------------------------------------------------
  # Neo4j — Graph-Datenbank für GraphRAG
  # Port 7688 (Bolt) & 7475 (HTTP) um Konflikte zu vermeiden
  # Standard-Ports 7687/7474 sind im Geschäft bereits belegt
  # -----------------------------------------------------------
  neo4j:
    image: neo4j:community
    container_name: neo4j-graphrag
    restart: unless-stopped
    ports:
      - "${NEO4J_HTTP_PORT:-7475}:7474"
      - "${NEO4J_BOLT_PORT:-7688}:7687"
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
      - ./data/neo4j/plugins:/plugins
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME:-graphmaster}/${NEO4J_PASSWORD:-Kn0wl3dg3Graph!2024}
      # APOC Plugin für GraphRAG
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
      # Memory-Konfiguration (angepasst an 64GB System)
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=512m
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # -----------------------------------------------------------
  # SearXNG — Selbst-gehostete Meta-Suchmaschine
  # Ermöglicht Web Search im Chat (Google, DuckDuckGo, etc.)
  # Kein eigenes UI nötig — wird von Open WebUI intern angesprochen
  # -----------------------------------------------------------
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "${SEARXNG_PORT:-8888}:8080"
    volumes:
      - ./config/searxng:/etc/searxng:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:${SEARXNG_PORT:-8888}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
